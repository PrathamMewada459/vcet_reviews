{% extends "base.html" %}
{% block title %}Student Portal — VCET Reviews{% endblock %}

{% block content %}
<div class="portal-page">

    <!-- Review Submission Form -->
    <div class="submit-section">
        <h2>Submit a Review</h2>
        <div id="form-msg" class="form-msg" style="display:none;"></div>
        <div class="submit-form-inner">
            <div class="form-group">
                <label>Select Subject</label>
                <select id="subject_id">
                    <option value="">-- Choose a subject --</option>
                    {% for s in subjects %}
                    <option value="{{ s.id }}" {% if s.id in reviewed_subject_ids %}disabled{% endif %}>
                        {{ s.name }} ({{ s.code }}) {% if s.id in reviewed_subject_ids %}✓ Reviewed{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Your Rating</label>
                <div class="star-picker" id="starPicker">
                    <span class="star" data-val="1">★</span>
                    <span class="star" data-val="2">★</span>
                    <span class="star" data-val="3">★</span>
                    <span class="star" data-val="4">★</span>
                    <span class="star" data-val="5">★</span>
                </div>
                <input type="hidden" id="rating" value="0">
            </div>
            <div class="form-group">
                <label>Your Review <span id="char-count" class="char-count">0 / 500</span></label>
                <textarea id="review-text" placeholder="Share your honest feedback (20–500 characters)..." rows="3"></textarea>
            </div>
            <button onclick="submitReview()" class="btn-primary">Submit Review</button>
        </div>
    </div>

    <!-- Split Layout -->
    <div class="portal-split">

        <!-- LEFT: Review Feed -->
        <div class="feed-panel">
            <h2>All Reviews</h2>
            <!-- JS loads reviews into this div -->
            <div class="review-feed" id="reviewFeed">
                <div class="empty-state" style="display:flex;align-items:center;gap:10px;">
                    <span>Loading reviews...</span>
                </div>
            </div>
        </div>

        <!-- RIGHT: Top Review Spotlight -->
        <div class="spotlight-panel">
            <h2>⭐ Top Review</h2>
            <!-- JS loads top review into this div -->
            <div id="topReviewBox">
                <div class="empty-state" style="display:flex;align-items:center;gap:10px;">
                    <span>Loading...</span>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
